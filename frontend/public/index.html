<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MotoFlash">
<title>MotoFlash</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--acc:#FF6B00;--acc2:#FF6B0018;--grn:#22C55E;--grn2:#22C55E18;--red:#EF4444;
--bg:#0D0D0D;--surf:#161616;--card:#1E1E1E;--bord:#2A2A2A;--txt:#F0F0F0;--mut:#888}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{height:100vh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(80px + env(safe-area-inset-bottom))}
input,select,button,textarea{font-family:inherit;font-size:14px;-webkit-appearance:none}
input,select{background:var(--surf);border:1px solid var(--bord);border-radius:8px;padding:12px 13px;color:var(--txt);width:100%;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:var(--acc)}
input::placeholder{color:var(--mut)}
select option{background:#1E1E1E}
.lbl{font-size:12px;color:var(--mut);margin-bottom:4px;display:block}
.btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;margin-top:8px;transition:opacity .15s;display:block}
.btn:active{opacity:.8}
.btn-acc{background:var(--acc);color:#fff}
.btn-grn{background:var(--grn);color:#fff}
.btn-ghost{background:transparent;color:var(--mut);border:1px solid var(--bord)}
.card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:15px;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.hdr{background:var(--surf);border-bottom:1px solid var(--bord);padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0}
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--bord);flex-shrink:0}
.tab{flex:1;padding:12px 4px;background:transparent;color:var(--mut);border:none;cursor:pointer;font-weight:700;font-size:12px;border-bottom:3px solid transparent;transition:.2s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--surf);border-radius:10px;padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:800}
.stat-l{font-size:11px;color:var(--mut);margin-top:2px}
.row{display:flex;align-items:center;gap:8px}
.bold{font-weight:700}
.muted{color:var(--mut)}
.small{font-size:12px}
.green{color:var(--grn)}
.acc{color:var(--acc)}
.info-box{background:var(--acc2);border-radius:10px;padding:12px;font-size:13px;color:var(--acc);margin-bottom:14px;line-height:1.5}
.info-box.grn{background:var(--grn2);color:var(--grn)}
.erro-box{background:#EF444422;color:var(--red);border-radius:8px;padding:11px;margin-top:6px;font-size:13px;line-height:1.5;display:none}
#mapa-entrega{height:240px;width:100%;border-radius:12px;border:1px solid var(--bord);margin-bottom:10px}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--grn);animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #22C55E66}50%{box-shadow:0 0 0 7px #22C55E00}}
.step-bar{display:flex;flex-shrink:0}
.step{flex:1;text-align:center;padding:10px 4px;font-size:11px;font-weight:700;border-bottom:3px solid var(--bord);color:var(--mut)}
.step.done{border-bottom-color:var(--grn);color:var(--grn)}
.step.active{border-bottom-color:var(--acc);color:var(--acc)}
.eta-box{background:var(--acc2);border:1px solid #FF6B0044;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.overlay{position:fixed;inset:0;background:#000c;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sep{border:none;border-top:1px solid var(--bord);margin:12px 0}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── ESTADO ────────────────────────────────────────────────────────────────────
let S = {
  tela: "inicio",
  token: localStorage.getItem("mf_token"),
  user: (() => { try { return JSON.parse(localStorage.getItem("mf_user")); } catch(e) { return null; } })(),
  tipo: localStorage.getItem("mf_tipo"),
  entregas: [], minhasEntregas: [],
  corridaAtiva: null, corridaStep: null,
  gpsAtivo: false, watchId: null,
  motoLat: null, motoLng: null,
  distRestante: null, etaMin: null,
  pagRest: "pedidos", pagMoto: "corridas",
  pixModal: null, loading: false,
};

// Auto-login
if (S.token && S.user && S.tipo) {
  S.tela = S.tipo === "restaurante" ? "painel_rest" : "painel_moto";
}

let mapInstance = null, motoMarker = null, rotaLayer = null;

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (S.token) opts.headers["Authorization"] = "Bearer " + S.token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch("/api" + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.erro || "Erro " + r.status);
  return data;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, cor = "#22C55E") {
  const t = document.getElementById("toast");
  t.style.background = cor; t.style.color = "#fff";
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ── SET + RENDER ──────────────────────────────────────────────────────────────
function set(upd) { Object.assign(S, upd); render(); }

function render() {
  const telas = { inicio, login_rest, cadastro_rest, painel_rest, login_moto, cadastro_moto, painel_moto };
  document.getElementById("app").innerHTML = (telas[S.tela] || inicio)();
  bind();
  if (S.corridaAtiva && S.corridaStep && S.corridaStep !== "entregue") {
    setTimeout(() => initMapa(S.corridaAtiva), 100);
  }
  if (S.tela === "painel_moto" && S.pagMoto === "corridas" && !S.corridaAtiva) carregarDisp();
  if (S.tela === "painel_rest" && S.pagRest === "pedidos") carregarMeus();
  if (S.pixModal) {
    const div = document.createElement("div");
    div.innerHTML = pixModalHTML();
    document.getElementById("app").appendChild(div.firstChild);
    bindPix();
  }
}

// ── CARREGAR DADOS ─────────────────────────────────────────────────────────────
async function carregarDisp() {
  try { S.entregas = await api("GET", "/entregas/disponiveis"); render(); } catch(e) {}
}
async function carregarMeus() {
  try { S.minhasEntregas = await api("GET", "/entregas/restaurante"); render(); } catch(e) {}
}

// ── HELPERS HTML ──────────────────────────────────────────────────────────────
function hdr(titulo, back) {
  return `<div class="hdr">
    <button onclick="set({tela:'${back}',erro:null})" style="background:none;border:none;color:var(--mut);cursor:pointer;font-size:24px;padding:0;line-height:1">‹</button>
    <div class="bold" style="font-size:15px;flex:1;text-align:center">${titulo}</div>
    <div style="width:24px"></div>
  </div>`;
}

function campo(lbl, id, type, ph, val = "") {
  return `<div><span class="lbl">${lbl}</span><input id="${id}" type="${type}" placeholder="${ph}" value="${val}" autocomplete="off"></div>`;
}

function stBadge(status) {
  const map = { disponivel: ["Aguardando", "#FF6B0018", "#FF6B00"], em_entrega: ["Em entrega", "#22C55E18", "#22C55E"], coletado: ["Coletado", "#22C55E18", "#22C55E"], entregue: ["Entregue", "#77777722", "#888"] };
  const [l, bg, c] = map[status] || ["?", "#77777722", "#888"];
  return `<span class="badge" style="background:${bg};color:${c}">${l}</span>`;
}

function calcTarifa(km) { return Math.max(5, 5 + parseFloat(km || 2) * 1.8); }

// ── TELAS ──────────────────────────────────────────────────────────────────────
function inicio() {
  return `
  <div class="screen" style="display:flex;flex-direction:column;justify-content:center;min-height:100%">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:54px;margin-bottom:10px">🏍️</div>
      <div style="font-size:28px;font-weight:800;letter-spacing:-1px">Moto<span style="color:var(--acc)">Flash</span></div>
      <div class="muted small" style="margin-top:6px">Entregas em qualquer cidade do Brasil</div>
    </div>
    <div class="card" style="cursor:pointer;margin-bottom:10px" onclick="set({tela:'login_rest'})">
      <div class="row" style="gap:14px">
        <div class="avatar" style="background:var(--acc2)">🍔</div>
        <div>
          <div class="bold">Sou Restaurante / Comercio</div>
          <div class="muted small">Cadastre e gerencie suas entregas</div>
          <div style="margin-top:6px"><span class="badge" style="background:var(--acc2);color:var(--acc)">R$ 19,90/mes</span></div>
        </div>
      </div>
    </div>
    <div class="card" style="cursor:pointer" onclick="set({tela:'login_moto'})">
      <div class="row" style="gap:14px">
        <div class="avatar" style="background:var(--grn2)">🏍️</div>
        <div>
          <div class="bold">Sou Motoboy</div>
          <div class="muted small">Receba corridas e ganhe por entrega</div>
          <div style="margin-top:6px"><span class="badge" style="background:var(--grn2);color:var(--grn)">Cadastro gratuito</span></div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:20px" class="muted small">App retém 20% por corrida · PIX automatico</div>
  </div>`;
}

function login_rest() {
  return `${hdr("Restaurante", "inicio")}
  <div class="screen">
    <div class="bold" style="font-size:16px;margin-bottom:4px;margin-top:4px">Entrar</div>
    <div class="muted small" style="margin-bottom:14px">Use o email e senha cadastrados</div>
    ${campo("Email", "lr-email", "email", "seu@email.com")}
    ${campo("Senha", "lr-senha", "password", "Sua senha")}
    <div class="erro-box" id="lr-erro"></div>
    <button class="btn btn-acc" id="btn-login-rest">Entrar</button>
    <div class="sep"></div>
    <button class="btn btn-ghost" onclick="set({tela:'cadastro_rest'})">Criar nova conta</button>
  </div>`;
}

function cadastro_rest() {
  return `${hdr("Novo Cadastro", "login_rest")}
  <div class="screen">
    <div class="info-box">Plano mensal R$ 19,90 — funciona em qualquer cidade</div>
    ${campo("Nome do estabelecimento *", "cr-nome", "text", "Ex: Bar do Ze, Pizzaria Napoli")}
    ${campo("Email *", "cr-email", "email", "email@seurestaurante.com")}
    ${campo("Senha * (minimo 6 caracteres)", "cr-senha", "password", "Crie uma senha")}
    ${campo("WhatsApp *", "cr-tel", "tel", "(12) 99999-0000")}
    ${campo("Cidade *", "cr-cid", "text", "Ex: Ilhabela")}
    ${campo("Endereco completo", "cr-end", "text", "Rua, numero - Bairro")}
    ${campo("Chave PIX", "cr-pix", "text", "CPF, telefone ou email")}
    <div><span class="lbl">Categoria</span>
    <select id="cr-cat"><option>Lanches</option><option>Pizza</option><option>Japonesa</option><option>Brasileira</option><option>Bar</option><option>Padaria</option><option>Outros</option></select></div>
    <div class="erro-box" id="cr-erro"></div>
    <button class="btn btn-acc" id="btn-cad-rest" style="margin-top:16px">
      ${S.loading ? "Cadastrando..." : "Cadastrar Restaurante"}
    </button>
  </div>`;
}

function painel_rest() {
  const u = S.user || {};
  const ag = S.minhasEntregas.filter(e => e.status === "disponivel").length;
  const em = S.minhasEntregas.filter(e => e.status === "em_entrega" || e.status === "coletado").length;
  const pgs = { pedidos: pgRestPedidos, nova: pgRestNova, conta: pgRestConta };
  return `${hdr(u.nome || "Restaurante", "inicio")}
  <div class="tabs">
    <button class="tab ${S.pagRest==="pedidos"?"on":""}" onclick="set({pagRest:'pedidos'})">Pedidos</button>
    <button class="tab ${S.pagRest==="nova"?"on":""}" onclick="set({pagRest:'nova'})">+ Nova</button>
    <button class="tab ${S.pagRest==="conta"?"on":""}" onclick="set({pagRest:'conta'})">Conta</button>
  </div>
  <div class="screen">
    <div class="grid2">
      <div class="stat"><div class="stat-n acc">${ag}</div><div class="stat-l">Aguardando</div></div>
      <div class="stat"><div class="stat-n green">${em}</div><div class="stat-l">Em entrega</div></div>
    </div>
    ${(pgs[S.pagRest] || pgRestPedidos)()}
  </div>`;
}

function pgRestPedidos() {
  if (!S.minhasEntregas.length) return `<div class="card" style="text-align:center;padding:28px"><div style="font-size:28px;margin-bottom:8px">📦</div><div class="muted">Nenhuma entrega ainda</div><div class="muted small" style="margin-top:6px">Va em "+ Nova" para publicar</div></div>`;
  return S.minhasEntregas.map(e => {
    const t = e.tarifa || calcTarifa(e.distancia_km);
    return `<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:8px">
        <div class="bold">${e.cliente_nome}</div>${stBadge(e.status)}
      </div>
      <div class="muted small">${e.cliente_endereco}</div>
      <div class="row" style="margin-top:10px;gap:20px">
        <div><div class="muted small">Pedido</div><div class="bold green">R$ ${Number(e.valor_pedido).toFixed(2)}</div></div>
        <div><div class="muted small">Corrida</div><div class="bold acc">R$ ${Number(t).toFixed(2)}</div></div>
        <div><div class="muted small">Dist.</div><div class="bold">${e.distancia_km} km</div></div>
      </div>
      ${e.motoboy_nome ? `<div class="row" style="margin-top:8px"><span>🏍️</span><span class="small bold">${e.motoboy_nome}</span></div>` : ""}
      ${(e.status === "em_entrega" || e.status === "coletado") && !e.pix_pago ? `<button class="btn btn-grn" style="margin-top:10px" onclick="abrirPix('${e.id}','${e.motoboy_id || ""}',${(t*0.8).toFixed(2)},'${e.motoboy_nome||"Motoboy"}')">💸 Pagar PIX ao Motoboy</button>` : ""}
    </div>`;
  }).join("");
}

function pgRestNova() {
  return `<div class="bold" style="margin-bottom:12px">Nova entrega</div>
    ${campo("Nome do cliente *", "ne-cli", "text", "Nome do cliente")}
    ${campo("Endereco de entrega *", "ne-end", "text", "Rua, numero - Bairro")}
    <button class="btn" style="background:var(--surf);color:var(--acc);border:1px solid var(--acc);margin-bottom:8px" onclick="calcDistAuto()">
      📍 Calcular distancia automaticamente
    </button>
    <div id="ne-preview" style="display:none;background:var(--surf);border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid var(--bord)"></div>
    ${campo("Valor do pedido (R$) *", "ne-val", "number", "Ex: 45.00")}
    <input type="hidden" id="ne-dist" value="2">
    <div class="erro-box" id="ne-erro"></div>
    <button class="btn btn-acc" id="btn-add-entrega">${S.loading ? "Publicando..." : "Publicar para motoboys"}</button>`;
}

function pgRestConta() {
  const u = S.user || {};
  return `<div class="card">
    <div class="row" style="gap:12px;margin-bottom:14px">
      <div class="avatar" style="background:var(--acc2)">🍔</div>
      <div><div class="bold">${u.nome||""}</div><div class="muted small">${u.cidade||""}</div></div>
    </div>
    <div class="sep" style="margin:10px 0"></div>
    <div class="row" style="justify-content:space-between;padding:7px 0">
      <span class="muted small">Plano</span>
      <span class="badge" style="background:${u.plano_ativo?"var(--grn2)":"var(--acc2)"};color:${u.plano_ativo?"var(--grn)":"var(--acc)"}">${u.plano_ativo ? "Ativo R$19,90/mes" : "Inativo"}</span>
    </div>
    ${!u.plano_ativo ? `<button class="btn btn-acc" id="btn-ativar-plano">Ativar plano R$ 19,90/mes</button>` : ""}
  </div>
  <button class="btn btn-ghost" id="btn-sair">Sair da conta</button>`;
}

function login_moto() {
  return `${hdr("Motoboy", "inicio")}
  <div class="screen">
    <div class="bold" style="font-size:16px;margin-bottom:4px;margin-top:4px">Entrar</div>
    <div class="muted small" style="margin-bottom:14px">Use o email e senha cadastrados</div>
    ${campo("Email", "lm-email", "email", "seu@email.com")}
    ${campo("Senha", "lm-senha", "password", "Sua senha")}
    <div class="erro-box" id="lm-erro"></div>
    <button class="btn btn-acc" id="btn-login-moto">Entrar</button>
    <div class="sep"></div>
    <button class="btn btn-ghost" onclick="set({tela:'cadastro_moto'})">Criar nova conta</button>
  </div>`;
}

function cadastro_moto() {
  return `${hdr("Cadastro Motoboy", "login_moto")}
  <div class="screen">
    <div class="info-box grn">Cadastro gratuito. App retém 20% por corrida. Voce recebe 80% via PIX na hora.</div>
    ${campo("Nome completo *", "cm-nome", "text", "Seu nome")}
    ${campo("Email *", "cm-email", "email", "seu@email.com")}
    ${campo("Senha * (minimo 6 caracteres)", "cm-senha", "password", "Crie uma senha")}
    ${campo("WhatsApp *", "cm-tel", "tel", "(12) 99999-0000")}
    ${campo("Chave PIX *", "cm-pix", "text", "CPF, telefone ou email")}
    ${campo("Placa da moto", "cm-placa", "text", "ABC1D23")}
    ${campo("Cidade onde vai trabalhar *", "cm-cid", "text", "Ex: Ilhabela")}
    <div class="erro-box" id="cm-erro"></div>
    <button class="btn btn-acc" id="btn-cad-moto" style="margin-top:16px">
      ${S.loading ? "Cadastrando..." : "Cadastrar e comecar"}
    </button>
  </div>`;
}

function painel_moto() {
  const u = S.user || {};
  const pgs = { corridas: pgMotoCorridas, conta: pgMotoConta };
  return `${hdr(u.nome || "Motoboy", "inicio")}
  <div class="tabs">
    <button class="tab ${S.pagMoto==="corridas"?"on":""}" onclick="set({pagMoto:'corridas'})">Corridas</button>
    <button class="tab ${S.pagMoto==="conta"?"on":""}" onclick="set({pagMoto:'conta'})">Conta</button>
  </div>
  <div class="screen">
    <div class="grid2">
      <div class="stat"><div class="stat-n acc">${u.corridas_total||0}</div><div class="stat-l">Corridas</div></div>
      <div class="stat"><div class="stat-n green">R$ ${Number(u.ganhos_total||0).toFixed(0)}</div><div class="stat-l">Ganhos</div></div>
    </div>
    ${S.corridaAtiva ? pgCorridaAtiva() : (pgs[S.pagMoto] || pgMotoCorridas)()}
  </div>`;
}

function pgMotoCorridas() {
  if (!S.entregas.length) return `<div class="card" style="text-align:center;padding:28px"><div style="font-size:28px;margin-bottom:8px">⏳</div><div class="muted">Nenhuma corrida disponivel agora</div><div class="muted small" style="margin-top:6px">Aguarde novos pedidos</div><button class="btn btn-ghost" style="max-width:200px;margin:12px auto 0" onclick="carregarDisp()">Atualizar</button></div>`;
  return S.entregas.map(e => {
    const t = e.tarifa || calcTarifa(e.distancia_km);
    const rec = (t * 0.8).toFixed(2);
    return `<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:8px">
        <div><div class="bold">${e.restaurante_nome || "Restaurante"}</div><div class="muted small">${e.restaurante_endereco || ""}</div></div>
        <span class="badge" style="background:var(--acc2);color:var(--acc)">${e.distancia_km} km</span>
      </div>
      <div class="row" style="margin-bottom:10px"><span>📍</span><span class="muted small">${e.cliente_endereco}</span></div>
      <div class="row" style="gap:20px">
        <div><div class="muted small">Tarifa</div><div class="bold acc">R$ ${Number(t).toFixed(2)}</div></div>
        <div><div class="muted small">Voce recebe</div><div class="bold green">R$ ${rec}</div></div>
      </div>

// ── ACOES ─────────────────────────────────────────────────────────────────────
async function calcDistAuto() {
  const endereco = document.getElementById("ne-end")?.value?.trim();
  const cidade = S.user?.cidade || "";
  if (!endereco) { mostrarErro("ne-erro","Preencha o endereco de entrega primeiro"); return; }

  const prev = document.getElementById("ne-preview");
  if (prev) { prev.style.display="block"; prev.innerHTML=`<div class="muted small" style="text-align:center">Calculando distancia...</div>`; }

  try {
    // Geocodificar endereco do cliente
    const endCompleto = encodeURIComponent(endereco + ", " + cidade + ", Brasil");
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${endCompleto}&format=json&limit=1`, {
      headers: {"User-Agent": "MotoFlash/1.0"}
    });
    const dados = await r.json();

    let km = 2; // fallback

    if (dados && dados[0]) {
      const clienteLat = parseFloat(dados[0].lat);
      const clienteLng = parseFloat(dados[0].lon);

      // Pegar coordenadas do restaurante (ou usar centro da cidade)
      const restLat = S.user?.lat || clienteLat + 0.01;
      const restLng = S.user?.lng || clienteLng + 0.01;

      km = calcDist(restLat, restLng, clienteLat, clienteLng);
      if (km < 0.5) km = 0.5;
      if (km > 50) km = 50;
    }

    const distInput = document.getElementById("ne-dist");
    if (distInput) distInput.value = km.toFixed(1);

    const t = calcTarifa(km);
    if (prev) {
      prev.innerHTML = `
        <div class="row" style="justify-content:space-between;margin-bottom:6px">
          <span class="muted small">Distancia calculada</span>
          <span class="bold acc">${km.toFixed(1)} km</span>
        </div>
        <div class="row" style="justify-content:space-between;margin-bottom:6px">
          <span class="muted small">Tarifa total</span>
          <span class="bold">R$ ${t.toFixed(2)}</span>
        </div>
        <div class="row" style="justify-content:space-between;margin-bottom:6px">
          <span class="muted small">Motoboy recebe (80%)</span>
          <span class="bold green">R$ ${(t*0.8).toFixed(2)}</span>
        </div>
        <div class="row" style="justify-content:space-between">
          <span class="muted small">App retém (20%)</span>
          <span class="bold">R$ ${(t*0.2).toFixed(2)}</span>
        </div>`;
    }
    // Limpar erro se existia
    const erroEl = document.getElementById("ne-erro");
    if (erroEl) erroEl.style.display = "none";

  } catch(e) {
    // Se falhar geocoding usa distancia padrao
    const km = 2;
    const distInput = document.getElementById("ne-dist");
    if (distInput) distInput.value = km;
    const t = calcTarifa(km);
    if (prev) {
      prev.innerHTML = `
        <div class="muted small" style="margin-bottom:8px">Endereco nao localizado — usando distancia padrao</div>
        <div class="row" style="justify-content:space-between"><span class="muted small">Distancia estimada</span><span class="bold acc">2.0 km</span></div>
        <div class="row" style="justify-content:space-between;margin-top:6px"><span class="muted small">Motoboy recebe</span><span class="bold green">R$ ${(t*0.8).toFixed(2)}</span></div>`;
    }
  }
}

// ── GPS + MAPA ─────────────────────────────────────────────────────────────────
function ativarGPS() {
  if (!navigator.geolocation) { toast("GPS nao disponivel", "#EF4444"); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    S.motoLat = pos.coords.latitude; S.motoLng = pos.coords.longitude;
    S.gpsAtivo = true;
    iniciarWatch();
    if (S.corridaAtiva) buscarRota();
    render();
  }, () => {
    S.motoLat = -23.553; S.motoLng = -45.355;
    S.gpsAtivo = true;
    iniciarWatch();
    if (S.corridaAtiva) buscarRota();
    render();
    toast("Usando posicao simulada", "#FF6B00");
  }, { enableHighAccuracy: true, timeout: 8000 });
}

function iniciarWatch() {
  if (S.watchId) navigator.geolocation.clearWatch(S.watchId);
  if (!navigator.geolocation) return;
  S.watchId = navigator.geolocation.watchPosition(pos => {
    S.motoLat = pos.coords.latitude; S.motoLng = pos.coords.longitude;
    if (motoMarker) motoMarker.setLatLng([S.motoLat, S.motoLng]);
    if (mapInstance) mapInstance.panTo([S.motoLat, S.motoLng], {animate:true, duration:0.8});
    atualizarDistETA();
    buscarRota();
    if (S.token && S.corridaAtiva) api("POST", "/motoboy/gps", {lat:S.motoLat, lng:S.motoLng}).catch(()=>{});
  }, ()=>{}, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
}

function atualizarDistETA() {
  if (!S.corridaAtiva || !S.motoLat) return;
  const dest = S.corridaStep==="indo"
    ? {lat: S.corridaAtiva.rest_lat||-23.55, lng: S.corridaAtiva.rest_lng||-45.35}
    : {lat: S.corridaAtiva.cliente_lat, lng: S.corridaAtiva.cliente_lng};
  const d = calcDist(S.motoLat, S.motoLng, dest.lat, dest.lng);
  S.distRestante = d; S.etaMin = Math.ceil(d/0.5);
  const e1 = document.getElementById("dist-val"); const e2 = document.getElementById("eta-val");
  if (e1) e1.textContent = d.toFixed(1)+" km";
  if (e2) e2.textContent = S.etaMin+" min";
}

function calcDist(a,b,c,d) {
  const R=6371, dL=(c-a)*Math.PI/180, dl=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function buscarRota() {
  if (!S.motoLat || !S.corridaAtiva || !mapInstance) return;
  const dest = S.corridaStep==="indo"
    ? [S.corridaAtiva.rest_lng||-45.35, S.corridaAtiva.rest_lat||-23.55]
    : [S.corridaAtiva.cliente_lng, S.corridaAtiva.cliente_lat];
  try {
    const r = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson", {
      method:"POST", headers:{"Content-Type":"application/json","Authorization":"5b3ce3597851110001cf6248a2e9a5c3f1a74073be7dc1c18c6f4db4"},
      body: JSON.stringify({coordinates:[[S.motoLng,S.motoLat],dest]})
    });
    const data = await r.json();
    if (data.features?.[0]) {
      const coords = data.features[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      const props = data.features[0].properties.summary;
      S.distRestante = props.distance/1000; S.etaMin = Math.ceil(props.duration/60);
      if (rotaLayer) mapInstance.removeLayer(rotaLayer);
      rotaLayer = window.L.polyline(coords,{color:"#FF6B00",weight:5,opacity:.85}).addTo(mapInstance);
      mapInstance.fitBounds(rotaLayer.getBounds(),{padding:[50,50]});
      atualizarDistETA();
    }
  } catch(e) {}
}

function initMapa(e) {
  const el = document.getElementById("mapa-entrega");
  if (!el || !window.L) return;
  if (mapInstance) { mapInstance.remove(); mapInstance = null; motoMarker = null; rotaLayer = null; }
  const restLat = e.rest_lat||-23.55, restLng = e.rest_lng||-45.35;
  const center = S.motoLat ? [S.motoLat,S.motoLng] : [restLat,restLng];
  mapInstance = window.L.map("mapa-entrega",{zoomControl:false,attributionControl:false}).setView(center,14);
  window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapInstance);
  const mk = (em,cor) => window.L.divIcon({html:`<div style="background:${cor};width:34px;height:34px;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:16px">${em}</div>`,iconSize:[34,34],iconAnchor:[17,17],className:""});
  window.L.marker([restLat,restLng],{icon:mk("🍔","#FF6B00")}).addTo(mapInstance).bindPopup(e.restaurante_nome||"Restaurante");
  window.L.marker([e.cliente_lat,e.cliente_lng],{icon:mk("🏠","#22C55E")}).addTo(mapInstance).bindPopup(e.cliente_nome);
  if (S.motoLat) {
    motoMarker = window.L.marker([S.motoLat,S.motoLng],{icon:mk("🏍️","#1E1E1E")}).addTo(mapInstance);
    buscarRota();
  } else {
    window.L.polyline([[restLat,restLng],[e.cliente_lat,e.cliente_lng]],{color:"#FF6B00",weight:4,dashArray:"8 6",opacity:.6}).addTo(mapInstance);
    mapInstance.fitBounds([[restLat,restLng],[e.cliente_lat,e.cliente_lng]],{padding:[50,50]});
  }
}

      });
      toast("Entrega publicada para motoboys!");
      S.loading=false;
      set({pagRest:"pedidos"});
    } catch(e) { S.loading=false; mostrarErro("ne-erro",e.message); render(); }
  });

  on("btn-ativar-plano", async () => {
    try {
      await api("POST","/restaurante/ativar-plano",{});
      const u={...S.user,plano_ativo:true};
      localStorage.setItem("mf_user",JSON.stringify(u));
      set({user:u}); toast("Plano ativado!");
    } catch(e) { toast(e.message,"#EF4444"); }
  });

  on("btn-sair", () => {
    localStorage.clear();
    if (S.watchId) navigator.geolocation.clearWatch(S.watchId);
    if (mapInstance) { mapInstance.remove(); mapInstance=null; }
    set({token:null,user:null,tipo:null,tela:"inicio",corridaAtiva:null,corridaStep:null,gpsAtivo:false});
  });
}

function bindPix() {
  const on = (id,fn) => { const el=document.getElementById(id); if(el) el.addEventListener("click",fn); };
  const overlay = document.getElementById("overlay-pix");
  if (overlay) overlay.addEventListener("click", e => { if(e.target===overlay) set({pixModal:null}); });
  on("btn-confirmar-pix", async () => {
    try {
      await api("POST",`/pix/pagar/${S.pixModal.entregaId}`,{});
      set({pixModal:{...S.pixModal,enviado:true}});
    } catch(e) { toast(e.message,"#EF4444"); }
  });
}

// Service Worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}

render();
</script>
</body>
</html>
